name: wifi_network_app
description: تطبيق إدارة شبكات WiFi

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.8.1

  # خريطة
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  flutter_map_tile_caching: ^10.0.0

  # موقع
  geolocator: ^13.0.2

  # شبكات WiFi
  wifi_scan: ^0.4.1
  network_info_plus: ^6.1.3

  # بطارية
  battery_plus: ^6.2.1

  # HTTP
  http: ^1.3.0

  # تخزين محلي
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path_provider: ^2.1.5

  # UI
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7
  intl: ^0.20.2

  # أدوات
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  flutter_local_notifications: ^19.0.0

dependency_overrides:
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
